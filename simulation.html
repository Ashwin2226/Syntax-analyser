<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Syntax Analyzer — Ashwin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--wa-bg:#0b141a;--wa-panel:#202c33;--wa-teal:#00a884;--wa-bubble-out:#005c4b;--wa-bubble-in:#202c33;--wa-text:#e9edef;--wa-muted:#8696a0;--wa-border:#313d45;--accent:#38bdf8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background-color:var(--wa-bg);color:var(--wa-text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

header{background:var(--wa-panel);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--wa-border);}
.brand{display:flex;align-items:center;gap:12px;}.avatar{width:40px;height:40px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#0b141a;}

.layout{flex:1;display:grid;grid-template-columns:400px 1fr;overflow:hidden;}

/* Sidebar Editor */
.sidebar{background:#111b21;border-right:1px solid var(--wa-border);display:flex;flex-direction:column;padding:15px;}
.label{color:var(--wa-teal);font-size:12px;font-weight:700;margin-bottom:10px;text-transform:uppercase;}
textarea{flex:1;background:#2a3942;border:none;border-radius:10px;color:#d1d7db;padding:15px;font-family:'JetBrains Mono',monospace;font-size:13px;resize:none;outline:none;}
.controls{display:flex;gap:10px;margin-top:15px;}
.btn-run{flex:1;background:var(--wa-teal);border:none;padding:12px;border-radius:8px;color:#0b141a;font-weight:700;cursor:pointer;}

/* Chat Window */
.chat-window{background-image:url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');background-size:contain;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:15px;}
.bubble{max-width:90%;padding:12px;border-radius:10px;font-size:14px;position:relative;box-shadow:0 1px 0.5px rgba(0,0,0,0.13);}
.bubble.in{background:var(--wa-bubble-in);align-self:flex-start;border-top-left-radius:0;}
.bubble.out{background:var(--wa-bubble-out);align-self:flex-end;border-top-right-radius:0;}
.sender{color:var(--wa-teal);font-size:11px;font-weight:700;margin-bottom:5px;text-transform:uppercase;}

/* AST Tree Styling */
.ast-container { font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 5px; color: #cbd5e1; }
.tree-node { margin-left: 15px; border-left: 1px solid #475569; padding-left: 10px; }
.type { color: var(--accent); font-weight: bold; }
.val { color: #fbbf24; }

footer{background:var(--wa-panel);padding:12px 20px;border-top:1px solid var(--wa-border);display:flex;justify-content:space-between;font-size:13px;color:var(--wa-muted);}
</style>
</head>
<body>

<header>
    <div class="brand">
        <div class="avatar">🔬</div>
        <div>
            <h2 style="font-size:16px;font-weight:500;">Ashwin's Syntax Lab</h2>
            <p style="font-size:12px;color:var(--wa-teal);">online (Parser Active)</p>
        </div>
    </div>
</header>

<div class="layout">
    <div class="sidebar">
        <span class="label">Input Source Code</span>
        <textarea id="code" spellcheck="false">int main() {
    int x = 10;
    if (x > 5) {
        return x;
    }
}</textarea>
        <div class="controls">
            <button class="btn-run" onclick="parseCode()">⚡ ANALYZE SYNTAX</button>
        </div>
    </div>

    <div class="chat-window" id="chat">
        <div class="bubble in">
            <div class="sender">SYSTEM</div>
            Welcome Ashwin! Ready for Syntax Analysis. Provide your source code. I will check for grammatical correctness and build the **Abstract Syntax Tree (AST)**.
        </div>
    </div>
</div>

<footer>
    <div>Student: <strong>Ashwin</strong></div>
    <div>Reg No: <strong>RA2311003050382</strong></div>
</footer>

<script>
function parseCode() {
    const chat = document.getElementById('chat');
    chat.innerHTML += `<div class="bubble out"><div class="sender">YOU</div>Parse the syntax of my code.</div>`;

    setTimeout(() => {
        // Mock AST visualization for simulation
        const astHtml = `
            <div class="ast-container">
                <div><span class="type">PROGRAM</span></div>
                <div class="tree-node">
                    <div><span class="type">FUNC_DEF</span>: <span class="val">main</span></div>
                    <div class="tree-node">
                        <div><span class="type">BLOCK</span></div>
                        <div class="tree-node">
                            <div><span class="type">VAR_DECL</span>: <span class="val">int x = 10</span></div>
                            <div><span class="type">IF_STMT</span></div>
                            <div class="tree-node">
                                <div><span class="type">CONDITION</span>: <span class="val">x > 5</span></div>
                                <div><span class="type">RETURN</span>: <span class="val">x</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;

        chat.innerHTML += `
            <div class="bubble in">
                <div class="sender">PARSER ENGINE</div>
                Syntax Check Passed. Abstract Syntax Tree (AST) generated:
                ${astHtml}
                <div style="margin-top:10px; color:#4ade80; font-size:12px; font-weight:bold;">
                    ✅ Status: Valid Syntax
                </div>
            </div>
        `;
        chat.scrollTop = chat.scrollHeight;
    }, 800);
}
</script>

</body>
</html>
